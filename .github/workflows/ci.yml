name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Placeholder values only — sufficient to satisfy the app's own environment
# validation (src/lib/env.ts) so it can start up in CI. Most e2e tests mock
# API responses at the network level and never actually reach Supabase,
# the Pokémon TCG API, or an AI provider, so these do not need to be real
# credentials. Do not put real secrets here.
env:
  NEXT_PUBLIC_APP_URL: http://localhost:3000
  NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key
  SUPABASE_SERVICE_ROLE_KEY: ci-placeholder-service-role-key
  POKEMON_TCG_API_KEY: ci-placeholder-pokemon-key
  AI_PROVIDER: anthropic
  AI_MODEL: claude-sonnet-5
  ANTHROPIC_API_KEY: ci-placeholder-anthropic-key
  AI_REVIEW_LIMIT_PER_DAY: "5"
  AI_DECK_GENERATION_LIMIT_PER_DAY: "2"

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test

  e2e-tests:
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, unit-tests]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
